openapi: 3.1.0
info:
    title: ResilienceService API
    version: 1.0.0
paths:
    /api/resilience/v1/get-resilience-score:
        get:
            tags:
                - ResilienceService
            summary: GetResilienceScore
            operationId: GetResilienceScore
            parameters:
                - name: countryCode
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetResilienceScoreResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/resilience/v1/get-resilience-ranking:
        get:
            tags:
                - ResilienceService
            summary: GetResilienceRanking
            operationId: GetResilienceRanking
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetResilienceRankingResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
components:
    schemas:
        Error:
            type: object
            properties:
                message:
                    type: string
                    description: Error message (e.g., 'user not found', 'database connection failed')
            description: Error is returned when a handler encounters an error. It contains a simple error message that the developer can customize.
        FieldViolation:
            type: object
            properties:
                field:
                    type: string
                    description: The field path that failed validation (e.g., 'user.email' for nested fields). For header validation, this will be the header name (e.g., 'X-API-Key')
                description:
                    type: string
                    description: Human-readable description of the validation violation (e.g., 'must be a valid email address', 'required field missing')
            required:
                - field
                - description
            description: FieldViolation describes a single validation error for a specific field.
        ValidationError:
            type: object
            properties:
                violations:
                    type: array
                    items:
                        $ref: '#/components/schemas/FieldViolation'
                    description: List of validation violations
            required:
                - violations
            description: ValidationError is returned when request validation fails. It contains a list of field violations describing what went wrong.
        GetResilienceScoreRequest:
            type: object
            properties:
                countryCode:
                    type: string
        GetResilienceScoreResponse:
            type: object
            properties:
                countryCode:
                    type: string
                overallScore:
                    type: number
                    format: double
                level:
                    type: string
                domains:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceDomain'
                trend:
                    type: string
                change30d:
                    type: number
                    format: double
                lowConfidence:
                    type: boolean
                imputationShare:
                    type: number
                    format: double
                baselineScore:
                    type: number
                    format: double
                stressScore:
                    type: number
                    format: double
                stressFactor:
                    type: number
                    format: double
                dataVersion:
                    type: string
                scoreInterval:
                    $ref: '#/components/schemas/ScoreInterval'
                pillars:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResiliencePillar'
                schemaVersion:
                    type: string
                    description: |-
                        Phase 2 T2.1: "1.0" (default, preserves the current response shape)
                         or "2.0" (adds pillars; keeps overall_score / baseline_score / etc.
                         populated for one release cycle for backward compat). Controlled at
                         response build time by the RESILIENCE_SCHEMA_V2_ENABLED env flag.
        ResilienceDomain:
            type: object
            properties:
                id:
                    type: string
                score:
                    type: number
                    format: double
                weight:
                    type: number
                    format: double
                dimensions:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceDimension'
        ResilienceDimension:
            type: object
            properties:
                id:
                    type: string
                score:
                    type: number
                    format: double
                coverage:
                    type: number
                    format: double
                observedWeight:
                    type: number
                    format: double
                imputedWeight:
                    type: number
                    format: double
                imputationClass:
                    type: string
                    description: |-
                        Four-class imputation taxonomy (Phase 1 T1.7). Empty string when the
                         dimension has any observed data. One of: "stable-absence", "unmonitored",
                         "source-failure", "not-applicable". See docs/methodology/country-resilience-index.mdx.
                freshness:
                    $ref: '#/components/schemas/DimensionFreshness'
        DimensionFreshness:
            type: object
            properties:
                lastObservedAtMs:
                    type: string
                    format: int64
                    description: |-
                        Unix milliseconds when the oldest constituent signal in this
                         dimension was last observed (min fetchedAt across INDICATOR_REGISTRY
                         entries for this dimension). 0 when no signal has ever been
                         observed.
                staleness:
                    type: string
                    description: |-
                        Worst staleness level across the dimension's constituent signals,
                         classified by classifyStaleness against each signal's cadence.
                         One of: "fresh", "aging", "stale". Empty string when no signals.
        ScoreInterval:
            type: object
            properties:
                p05:
                    type: number
                    format: double
                p95:
                    type: number
                    format: double
        ResiliencePillar:
            type: object
            properties:
                id:
                    type: string
                    description: '"structural-readiness" | "live-shock-exposure" | "recovery-capacity".'
                score:
                    type: number
                    format: double
                    description: Pillar score in [0, 100]. 0 when shipped empty (T2.1).
                weight:
                    type: number
                    format: double
                    description: 'Pillar weight in the overall combine. Per the plan: 0.40 / 0.35 / 0.25.'
                coverage:
                    type: number
                    format: double
                    description: Coverage in [0, 1]. 0 when shipped empty (T2.1).
                domains:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceDomain'
            description: |-
                Phase 2 T2.1 of the country-resilience reference-grade upgrade plan.
                 Three-pillar response shape that regroups the existing 5 domains into
                 long-run capacity, current shock pressure, and recovery capability.
                 Shipped as a shaped-but-empty payload in T2.1 (score=0, coverage=0);
                 real aggregation lands in T2.3 / PR 4 of the Phase 2 rebuild.
        GetResilienceRankingRequest:
            type: object
        GetResilienceRankingResponse:
            type: object
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceRankingItem'
                greyedOut:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceRankingItem'
        ResilienceRankingItem:
            type: object
            properties:
                countryCode:
                    type: string
                overallScore:
                    type: number
                    format: double
                level:
                    type: string
                lowConfidence:
                    type: boolean
                overallCoverage:
                    type: number
                    format: double
                rankStable:
                    type: boolean
